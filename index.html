<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discovery Intake | Phase 1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Blueprint Discovery Tool</h1>
            <p>Phase 1: Shadowing & Data Mapping</p>
        </header>

        <section id="shadowing-log">
            <h2>1. Shadowing Observations</h2>
            <div class="input-group">
                <input type="text" id="manual-process" placeholder="Current Manual Process (e.g., Texting photos to boss)">
                <input type="text" id="pain-point" placeholder="The 'Data Loss' Point (e.g., Photos get buried in chat)">
                <button onclick="addObservation()">Log Observation</button>
            </div>
            <ul id="observation-list"></ul>
        </section>

        <hr>

        <section id="data-mapping">
            <h2>2. Data Mapping (Column A-Z)</h2>
            <table id="data-table">
                <thead>
                    <tr>
                        <th>Field Name</th>
                        <th>Data Type</th>
                        <th>Purpose (The 'Why')</th>
                    </tr>
                </thead>
                <tbody id="mapping-body">
                </tbody>
            </table>
            <button class="export-btn" onclick="generateBlueprint()">Generate Functional Spec</button>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
